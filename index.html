<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f4f7fb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#101426" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="apple-mobile-web-app-title" content="記帳本">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- Preconnect to Google Fonts (non-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Critical CSS inline — renders app shell INSTANTLY (before styles.css loads) -->
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html{height:100%;height:-webkit-fill-available;}
  body{height:100%;height:-webkit-fill-available;overflow:hidden;-webkit-text-size-adjust:100%;font-family:system-ui,-apple-system,'Noto Sans TC',sans-serif;background:#f4f7fb;color:#182134;font-size:14px;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
  body:not(.light-mode){background:#101426;color:#f5f7ff}
  body.light-mode{background:#f4f7fb;color:#182134}
  #update-banner{display:none;position:fixed;top:calc(env(safe-area-inset-top,0px) + 6px);left:50%;transform:translateX(-50%);z-index:200;background:#ffb11f;color:#101426;font-size:12px;font-weight:700;padding:9px 18px;border-radius:999px;cursor:pointer;white-space:nowrap;box-shadow:0 10px 24px rgba(6,10,24,.2)}
  #app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;padding-top:env(safe-area-inset-top,0px);padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);position:fixed;inset:0;overflow:hidden;background:inherit}
  #app-header{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;flex-shrink:0;z-index:10;background:rgba(16,20,38,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 1px 0 rgba(255,255,255,.08)}
  #app-header h1{font-size:16px;font-weight:700}
  .header-right{display:flex;align-items:center;gap:6px}
  #version-badge{font-size:10px;padding:4px 9px;border-radius:999px;background:rgba(255,177,31,.16);border:1px solid rgba(255,177,31,.24);color:#ffb11f}
  #main-content{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
  #bottom-nav{height:calc(60px + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);display:flex;align-items:flex-start;flex-shrink:0;border-top:1px solid rgba(255,255,255,.08);z-index:10;width:100%;background:rgba(24,31,56,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
  body:not(.light-mode) #bottom-nav{background:rgba(24,31,56,.92);border-color:rgba(255,255,255,.08)}
  .nav-btn{flex:0 0 20%;width:20%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;color:#8080a0;font-size:10px;font-weight:600;padding:5px 0 3px;position:relative}
  .nav-icon-wrap{display:flex;align-items:center;justify-content:center;padding:2px 8px;border-radius:12px}
  .nav-btn.active{color:#ffb11f}
  .nav-fab{flex:0 0 20%;width:20%;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;padding:0}
  .nav-fab-circle{width:48px;height:48px;border-radius:50%;background:linear-gradient(145deg,#ffca55,#ffb11f);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:300;color:#101426;margin-top:-14px;box-shadow:0 14px 34px rgba(255,177,31,.24)}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px 20px;opacity:.7;text-align:center}
  .empty-state .icon{font-size:48px}
  #modal-overlay{display:flex;position:fixed;inset:0;z-index:100;pointer-events:none}
  #modal-overlay.hidden{display:none}
  #modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
  #modal-backdrop.visible{opacity:1;pointer-events:all}
  #modal-content{position:fixed;inset:0;max-width:430px;margin:0 auto;z-index:101;display:flex;flex-direction:column;transform:translateX(105%);transition:transform .28s cubic-bezier(.4,0,.2,1);max-height:100dvh;overflow:hidden;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);background:inherit}
  </style>
  <!-- Apply saved theme BEFORE first paint to prevent flash -->
  <script>
    if(localStorage.getItem('theme')!=='dark') document.body.classList.add('light-mode');
  </script>
  <!-- Full CSS loads async (non-blocking) -->
  <link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="styles.css"></noscript>
  <!-- Google Fonts async (non-blocking) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
  <title>記帳本</title>
</head>
<body>
<div id="update-banner">🔄 發現新版本，點此立即更新</div>
<div id="app">
  <header id="app-header">
    <h1>記帳本</h1>
    <div class="header-right">
      <button id="currency-btn" class="header-btn">TWD</button>
      <button id="theme-toggle-btn" aria-label="切換主題">🌙</button>
      <span id="version-badge">V4.8</span>
    </div>
  </header>
  <main id="main-content">
    <div class="empty-state" style="margin-top:80px;"><div class="icon">⏳</div><p>載入中…</p></div>
  </main>
  <nav id="bottom-nav">
    <button class="nav-btn active" data-view="home">
      <div class="nav-icon-wrap"><span style="font-size:30px">🗂️</span></div>
      <span>帳本</span>
    </button>
    <button class="nav-btn" data-view="search">
      <div class="nav-icon-wrap"><span style="font-size:30px">🔍</span></div>
      <span>搜尋</span>
    </button>
    <div class="nav-fab" id="nav-add-btn"><div class="nav-fab-circle">＋</div></div>
    <button class="nav-btn" data-view="stats">
      <div class="nav-icon-wrap"><span style="font-size:30px">📊</span></div>
      <span>統計</span>
    </button>
    <button class="nav-btn" data-view="settings">
      <div class="nav-icon-wrap"><span style="font-size:30px">⚙️</span></div>
      <span>設定</span>
    </button>
  </nav>
</div>
<div id="modal-overlay" class="hidden">
  <div id="modal-backdrop"></div>
  <div id="modal-content"></div>
</div>
<div id="toast"></div>
<script src="version.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
