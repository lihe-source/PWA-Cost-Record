<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="記帳本">
  <meta name="description" content="個人記帳 PWA，支援電子發票匯入與 Google Drive 備份">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">

  <title>記帳本</title>
</head>
<body>

<!-- Update Banner -->
<div id="update-banner">🔄 發現新版本，點此立即更新</div>

<!-- App Shell -->
<div id="app">

  <!-- Header -->
  <header id="app-header">
    <h1>記帳本</h1>
    <div class="header-right">
      <span id="version-badge">V0.4</span>
    </div>
  </header>

  <!-- Main Content (views rendered by JS) -->
  <main id="main-content">
    <div class="empty-state" style="margin-top:80px;">
      <div class="icon">⏳</div>
      <p>載入中…</p>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-view="home">
      <span class="icon">🏠</span>
      <span>主頁</span>
    </button>
    <button class="nav-btn" data-view="search">
      <span class="icon">🔍</span>
      <span>搜尋</span>
    </button>
    <button class="nav-btn" data-view="settings">
      <span class="icon">⚙️</span>
      <span>設定</span>
    </button>
    <button class="nav-btn" data-view="stats">
      <span class="icon">📊</span>
      <span>統計</span>
    </button>
    <button class="nav-btn" data-view="backup">
      <span class="icon">💾</span>
      <span>備份</span>
    </button>
  </nav>

</div>

<!-- Modal Overlay -->
<div id="modal-overlay" class="hidden">
  <div id="modal-content"></div>
</div>

<!-- Toast Notification -->
<div id="toast"></div>

<!-- Scripts -->
<script src="version.js"></script>
<script src="app.js"></script>

</body>
</html>
